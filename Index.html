<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Steven Obando | Diseñador Gráfico</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
padding:60px;
text-align:center;
}

h1{
font-size:50px;
}

.portfolio{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:40px;
}

.portfolio img{
width:100%;
border-radius:10px;
transition:0.3s;
}

.portfolio img:hover{
transform:scale(1.05);
}

.contact{
text-align:center;
padding:40px;
}

button{
background:#00ffd5;
border:none;
padding:15px 30px;
font-size:18px;
cursor:pointer;
border-radius:5px;
}

</style>
</head>

<body>

<header>

<h1>Steven Obando</h1>
<p>Diseñador gráfico | Branding | Arte digital</p>

</header>

<section class="portfolio">

<img src="https://picsum.photos/600/400?1">
<img src="https://picsum.photos/600/400?2">
<img src="https://picsum.photos/600/400?3">
<img src="https://picsum.photos/600/400?4">

</section>

<section class="contact">

<h2>Contacto</h2>

<p>Email: contacto@email.com</p>

</section>

</body>

</html>
